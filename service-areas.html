                <button class="filter-chip px-6 py-2 bg-gray-100 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition-colors" data-filter="15">4-8km: $15</button>
                <button class="filter-chip px-6 py-2 bg-gray-100 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition-colors" data-filter="20">8-12km: $20</button>
                <button class="filter-chip px-6 py-2 bg-gray-100 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition-colors" data-filter="25">12km+: $25+</button>
                <button id="clearFilters" class="hidden px-6 py-2 border-2 border-black rounded-full text-xs font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all">Clear All</button>

            <p class="text-xl text-gray-600 mb-10">Join the growing number of residents who trust Prime Press with their garment care.</p>
            <a href="/index#book-now" class="btn-primary inline-block bg-black text-white text-lg font-bold px-12 py-5 rounded-md uppercase tracking-widest shadow-lg">

    <script>
        // We redefine the map here or ensure suburb-autofill.js is modified to export it. 
        // For standard implementation, we'll use the data from your provided script.
        const suburbMap = {
            "ashburton": { pc: "3147", fee: "$25.00" },
            "ashwood": { pc: "3147", fee: "$20.00" },
            "balwyn": { pc: "3103", fee: "$20.00" },
            "balwyn-north": { pc: "3104", fee: "$20.00" },
            "bayswater": { pc: "3153", fee: "$25.00" },
            "blackburn-north": { pc: "3130", fee: "$10.00" },
            "blackburn-south": { pc: "3130", fee: "$10.00" },
            "box-hill": { pc: "3128", fee: "$15.00" },
            "box-hill-north": { pc: "3129", fee: "$10.00" },
            "box-hill-south": { pc: "3128", fee: "$15.00" },
            "bulleen": { pc: "3105", fee: "$25.00" },
            "burwood": { pc: "3125", fee: "$20.00" },
            "burwood-east": { pc: "3125", fee: "$15.00" },
            "camberwell": { pc: "3124", fee: "$25.00" },
            "canterbury": { pc: "3126", fee: "$20.00" },
            "chadstone": { pc: "3148", fee: "$25.00" },
            "doncaster": { pc: "3108", fee: "$20.00" },
            "doncaster-east": { pc: "3109", fee: "$15.00" },
            "donvale": { pc: "3111", fee: "$15.00" },
            "forest-hill": { pc: "3131", fee: "$10.00" },
            "glen-waverley": { pc: "3150", fee: "$20.00" },
            "hawthorn-east": { pc: "3123", fee: "$25.00" },
            "heathmont": { pc: "3135", fee: "$20.00" },
            "mitcham": { pc: "3132", fee: "$15.00" },
            "mont-albert": { pc: "3127", fee: "$15.00" },
            "mont-albert-north": { pc: "3127", fee: "$15.00" },
            "mount-waverley": { pc: "3149", fee: "$20.00" },
            "nunawading": { pc: "3131", fee: "$10.00" },
            "ringwood": { pc: "3134", fee: "$20.00" },
            "ringwood-east": { pc: "3134", fee: "$20.00" },
            "ringwood-north": { pc: "3134", fee: "$25.00" },
            "surrey-hills": { pc: "3127", fee: "$15.00" },
            "syndal": { pc: "3150", fee: "$20.00" },
            "templestowe": { pc: "3106", fee: "$25.00" },
            "templestowe-lower": { pc: "3106", fee: "$20.00" },
            "vermont": { pc: "3133", fee: "$15.00" },
            "vermont-south": { pc: "3133", fee: "$15.00" },
            "wantirna": { pc: "3152", fee: "$20.00" },
            "wantirna-south": { pc: "3152", fee: "$25.00" },
            "wheelers-hill": { pc: "3150", fee: "$25.00" }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('suburbGrid');
            const searchInput = document.getElementById('areaSearch');
            const searchStats = document.getElementById('searchStats');
            const filterChips = document.querySelectorAll('.filter-chip');
            const clearBtn = document.getElementById('clearFilters');

            // Generate the cards from the map
            Object.keys(suburbMap).forEach(key => {
                const data = suburbMap[key];
                const cleanName = key.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                const numericFee = data.fee.replace('$', '').split('.')[0];

                const card = document.createElement('a');
                card.href = `/service-areas/${key}`;
                card.className = 'suburb-card block p-6 bg-gray-50 rounded-xl border border-gray-200 hover:border-black hover:bg-white group';
                card.setAttribute('data-postcode', data.pc);
                card.setAttribute('data-fee', numericFee);
                card.setAttribute('data-name', cleanName.toLowerCase());

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-bold text-gray-700 group-hover:text-black">${cleanName}</span>
                        <span class="text-xs text-gray-400">${data.pc}</span>
                    </div>
                    <div class="text-[10px] font-bold uppercase tracking-wider text-gray-400 group-hover:text-black">Delivery Fee: ${data.fee}</div>
                `;
                grid.appendChild(card);
            });

            const suburbCards = document.querySelectorAll('.suburb-card');
            let activeFee = null;

            const updateDisplay = () => {
                const query = searchInput.value.toLowerCase().trim();
                let visibleCount = 0;

                suburbCards.forEach(card => {
                    const suburbName = card.getAttribute('data-name');
                    const postcode = card.getAttribute('data-postcode');
                    const fee = card.getAttribute('data-fee');
                    
                    const matchesSearch = suburbName.includes(query) || postcode.includes(query);
                    const matchesFilter = !activeFee || fee === activeFee;

                    if (matchesSearch && matchesFilter) {
                        card.style.display = 'block';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                if (query !== "" || activeFee) {
                    clearBtn.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                }

                searchStats.textContent = (query === "" && !activeFee) ? "" : `Found ${visibleCount} area(s)`;
            };

            searchInput.addEventListener('input', updateDisplay);

            filterChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const filterValue = chip.getAttribute('data-filter');
                    if (activeFee === filterValue) {
                        activeFee = null;
                        chip.classList.remove('active');
                    } else {
                        filterChips.forEach(c => c.classList.remove('active'));
                        activeFee = filterValue;
                        chip.classList.add('active');
                    }
                    updateDisplay();
                });
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = "";
                activeFee = null;
                filterChips.forEach(c => c.classList.remove('active'));
                updateDisplay();
            });
        });
    </script>
